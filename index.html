<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Teléfono Narrativo</title>

<style>
body {
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* Teléfono */
.phone {
  width: 300px;
  height: 600px;
  border-radius: 40px;
  background: black;
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 30px rgba(0,0,0,0.8);
}

/* Pantallas */
.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
}

.active {
  display: block;
}

/* Pantalla apagada */
#off {
  background: black;
}

/* Lock screen */
#lock {
  background: url('https://images.unsplash.com/photo-1517816428104-797678c7cf0c') center/cover;
  color: white;
  text-align: center;
  padding-top: 60px;
}

.time {
  font-size: 50px;
}

.date {
  font-size: 18px;
  opacity: 0.8;
}

.swipe {
  position: absolute;
  bottom: 30px;
  width: 100%;
  text-align: center;
  opacity: 0.7;
}

/* PIN */
#pin {
  background: black;
  color: white;
  text-align: center;
  padding-top: 50px;
}

.pin-dots {
  letter-spacing: 10px;
  font-size: 30px;
  margin-bottom: 20px;
}

.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 20px;
}

.key {
  background: #333;
  padding: 15px;
  border-radius: 50%;
  font-size: 20px;
}

/* Home */
#home {
  background: #000;
  color: white;
  padding: 20px;
}

.app {
  background: #222;
  padding: 15px;
  margin: 10px 0;
  border-radius: 15px;
  text-align: center;
}
</style>

</head>

<body>

<div class="phone">

  <!-- Pantalla apagada -->
  <div id="off" class="screen active" onclick="turnOn()"></div>

  <!-- Lock screen -->
  <div id="lock" class="screen">
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>
    <div class="swipe" onclick="goToPin()">Desliza para desbloquear ↑</div>
  </div>

  <!-- PIN -->
  <div id="pin" class="screen">
    <div class="pin-dots" id="dots">____</div>

    <div class="keypad">
      <div class="key" onclick="press(1)">1</div>
      <div class="key" onclick="press(2)">2</div>
      <div class="key" onclick="press(3)">3</div>
      <div class="key" onclick="press(4)">4</div>
      <div class="key" onclick="press(5)">5</div>
      <div class="key" onclick="press(6)">6</div>
      <div class="key" onclick="press(7)">7</div>
      <div class="key" onclick="press(8)">8</div>
      <div class="key" onclick="press(9)">9</div>
      <div></div>
      <div class="key" onclick="press(0)">0</div>
      <div onclick="clearPin()">⌫</div>
    </div>
  </div>

  <!-- Home -->
  <div id="home" class="screen">
    <h3>📱 Inicio</h3>
    <div class="app">💬 Mensajes</div>
    <div class="app">🖼️ Fotos</div>
    <div class="app">⚙️ Sistema</div>
  </div>

</div>

<script>

// Cambiar pantallas
function show(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screen).classList.add('active');
}

// Encender
function turnOn() {
  show('lock');
}

// Ir a PIN
function goToPin() {
  show('pin');
}

// Hora dinámica
function updateTime() {
  const now = new Date();
  document.getElementById("time").innerText =
    now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

  document.getElementById("date").innerText =
    now.toLocaleDateString();
}
setInterval(updateTime, 1000);
updateTime();

// PIN
let pin = "";
const correctPin = "1115";

function press(num) {
  if(pin.length < 4) {
    pin += num;
    updateDots();
  }

  if(pin.length === 4) {
    if(pin === correctPin) {
      show('home');
    } else {
      pin = "";
      updateDots();
      alert("PIN incorrecto");
    }
  }
}

function updateDots() {
  document.getElementById("dots").innerText =
    "*".repeat(pin.length) + "_".repeat(4 - pin.length);
}

function clearPin() {
  pin = pin.slice(0, -1);
  updateDots();
}

</script>

</body>
</html>
