<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Teléfono Narrativo</title>

<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/lock.css">
<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/whatsapp.css">

</head>

<body>

<div class="phone">

  <!-- OFF -->
  <div id="off" class="screen active" onclick="show('lock')"></div>

  <!-- LOCK -->
  <div id="lock" class="screen">
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>
    <div class="swipe">Desliza ↑</div>
  </div>

  <!-- PIN -->
  <div id="pin" class="screen">
    <div class="pin-dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <div class="keypad">
      <div class="key" onclick="press(1)">1</div>
      <div class="key" onclick="press(2)">2</div>
      <div class="key" onclick="press(3)">3</div>
      <div class="key" onclick="press(4)">4</div>
      <div class="key" onclick="press(5)">5</div>
      <div class="key" onclick="press(6)">6</div>
      <div class="key" onclick="press(7)">7</div>
      <div class="key" onclick="press(8)">8</div>
      <div class="key" onclick="press(9)">9</div>
      <div></div>
      <div class="key" onclick="press(0)">0</div>
      <div onclick="clearPin()">⌫</div>
    </div>
  </div>

  <!-- HOME -->
  <div id="home" class="screen">
    <div class="home-grid">
      <div class="app-icon" onclick="openApp('whatsapp')">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
        <p>WhatsApp</p>
      </div>
    </div>
  </div>

  <!-- WHATSAPP -->
<div id="whatsapp" class="screen hidden">
  <h3>WhatsApp</h3>

  <!-- TABS -->
  <div class="bottom-bar">
    <div onclick="showTab('chats')" class="tab-btn">Chats</div>
    <div onclick="showTab('status')" class="tab-btn">Estados</div>
    <div onclick="showTab('settings')" class="tab-btn">Ajustes</div>
  </div>

  <!-- CHATS -->
  <div id="chats" class="tab">
    <div class="chat-item" onclick="openApp('chat1')">
      <img src="https://i.pravatar.cc/40?img=1">
      <div>
        <b>Auron</b>
        <p>Último mensaje...</p>
      </div>
      <span class="time-chat">9:41</span>
    </div>
  </div>

  <!-- STATUS -->
  <div id="status" class="tab hidden">
    <div class="status-item" onclick="openStatus('status1')">
      <img src="https://i.pravatar.cc/40?img=2">
      <p>Alexby</p>
    </div>
  </div>

  <!-- SETTINGS -->
  <div id="settings" class="tab hidden">

    <div class="setting-item">
      <img src="https://i.pravatar.cc/50">
      <div>
        <b>Tu Nombre</b>
        <p>Tu descripción</p>
      </div>
    </div>

    <div class="setting-item">
      📱 Número: 8888-8888
    </div>

    <div class="setting-item">
      🔒 Bloqueados
    </div>
  </div>
</div>

<!-- PANTALLA DE HISTORIA (FUERA) -->
<div id="status1" class="screen hidden status-view">
  <!-- barra -->
  <div class="status-bar">
    <div class="status-progress" id="statusProgress"></div>
  </div>
  <!-- imagen -->
  <img id="statusImg" src="https://picsum.photos/300/600?1">
  <!-- cerrar -->
  <button onclick="closeStatus()">✖</button>

</div>
  
  <!-- CHAT -->
<div id="chat1" class="screen hidden chat-screen auron-bg">

  <div class="chat-header">
    <img src="https://i.pravatar.cc/40?img=1" onclick="openProfile()">
    <div>
      <b>Auron</b>
      <p class="online">online</p>
    </div>
  </div>

  <div class="messages">
    <div class="msg other">Hola 👀</div>
    <div class="msg me">Todo bien</div>

    <!--AUDIO CORRECTO -->
    <div class="msg other">
      <audio controls>
        <source src="audio/audio1.mp3" type="audio/mpeg">
      </audio>
    </div>

    <!--MAPA CORRECTO -->
    <div class="msg other">
      <iframe 
        src="https://maps.google.com/maps?q=Cartago&t=&z=13&ie=UTF8&iwloc=&output=embed"
        width="100%" height="150">
      </iframe>
    </div>
  </div>
  <button onclick="openApp('whatsapp')">⬅</button>
</div>


<!-- JS -->
<script src="js/main.js"></script>
<script src="js/lock.js"></script>
<script src="js/home.js"></script>
<script src="js/whatsapp.js"></script>
  
</body>
</html>
