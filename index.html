<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Teléfono Narrativo</title>

<style>
body {
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* Teléfono */
.phone {
  width: 300px;
  height: 600px;
  border-radius: 40px;
  background: black;
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 30px rgba(0,0,0,0.8);
}

/* Pantallas */
.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
}

.active {
  display: block;
}

/* Pantalla apagada */
#off {
  background: black;
}

/* Lock screen */
#lock {
  background: url('https://images.unsplash.com/photo-1517816428104-797678c7cf0c') center/cover;
  color: white;
  text-align: center;
  padding-top: 60px;
}

.time {
  font-size: 50px;
}

.date {
  font-size: 18px;
  opacity: 0.8;
}

.swipe {
  position: absolute;
  bottom: 30px;
  width: 100%;
  text-align: center;
  opacity: 0.7;
}

/* PIN */
#pin {
  background: black;
  color: white;
  text-align: center;
  padding-top: 50px;
}

.pin-dots {
  letter-spacing: 10px;
  font-size: 30px;
  margin-bottom: 20px;
}

.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 20px;
}

.key {
  background: #333;
  padding: 15px;
  border-radius: 50%;
  font-size: 20px;
}

/* Home */
#home {
  background: #000;
  color: white;
  padding: 20px;
}

.app {
  background: #222;
  padding: 15px;
  margin: 10px 0;
  border-radius: 15px;
  text-align: center;
}

.pin-dots {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 20px;
}

.dot {
  width: 15px;
  height: 15px;
  border: 2px solid white;
  border-radius: 50%;
}

.dot.filled {
  background: white;
}

.swipe {
  position: absolute;
  bottom: 30px;
  width: 100%;
  text-align: center;
  opacity: 0.7;
  font-size: 14px;
  animation: float 1.5s infinite;
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0); }
}

.home-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  padding: 20px;
  text-align: center;
}

.app-icon img {
  width: 50px;
  height: 50px;
}

.app-icon p {
  font-size: 12px;
  margin-top: 5px;
}

.messages {
  padding: 10px;
}

.msg {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  max-width: 70%;
}

.me {
  background: #0b93f6;
  margin-left: auto;
}

.other {
  background: #333;
}

  .hidden {
  display: none;
}
</style>

</head>

<body>

<div class="phone">

  <!-- Pantalla apagada -->
  <div id="off" class="screen active" onclick="turnOn()"></div>

  <!-- Lock screen -->
  <div id="lock" class="screen">
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>
<div class="swipe" id="swipeText">Desliza hacia arriba</div>
  </div>

  <!-- PIN -->
  <div id="pin" class="screen">
<div class="pin-dots" id="dots">
  <span class="dot"></span>
  <span class="dot"></span>
  <span class="dot"></span>
  <span class="dot"></span>
</div>

    <div class="keypad">
      <div class="key" onclick="press(1)">1</div>
      <div class="key" onclick="press(2)">2</div>
      <div class="key" onclick="press(3)">3</div>
      <div class="key" onclick="press(4)">4</div>
      <div class="key" onclick="press(5)">5</div>
      <div class="key" onclick="press(6)">6</div>
      <div class="key" onclick="press(7)">7</div>
      <div class="key" onclick="press(8)">8</div>
      <div class="key" onclick="press(9)">9</div>
      <div></div>
      <div class="key" onclick="press(0)">0</div>
      <div onclick="clearPin()">⌫</div>
    </div>
  </div>

  <!-- Home -->
<!-- Home -->
<div id="home" class="screen">
  <div class="home-grid">

    <div class="app-icon" onclick="openApp('whatsapp')">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
      <p>WhatsApp</p>
    </div>

    <div class="app-icon">
      <img src="https://cdn-icons-png.flaticon.com/512/1829/1829586.png">
      <p>Fotos</p>
    </div>

  </div>
</div>
  
  <!-- Tabs -->
  <div class="tabs">
    <button onclick="showTab('chats')">Chats</button>
    <button onclick="showTab('status')">Estados</button>
    <button onclick="showTab('contacts')">Contactos</button>
    <button onclick="showTab('settings')">Settings</button>
  </div>

  <!-- CHATS -->
  <div id="chats" class="tab">
    <div onclick="openChat('chat1')" class="chat-item">
      <p><b>Auron</b></p>
      <p>Último mensaje...</p>
    </div>
  </div>

  <!-- ESTADOS -->
  <div id="status" class="tab hidden">
    <div onclick="viewStatus()">
      <p>Ver historia de Alexby</p>
    </div>
  </div>

  <!-- CONTACTOS -->
  <div id="contacts" class="tab hidden">
    <div onclick="openContact()">
      <p><b>Auron</b></p>
      <p>Online</p>
    </div>
  </div>

  <!-- SETTINGS -->
  <div id="settings" class="tab hidden">
    <p><b>Tu número:</b> 8888-8888</p>
    <p><b>Estado:</b> No molestar</p>
  </div>

  <button onclick="goHome()">⬅</button>
</div>

<div id="chat1" class="screen hidden">

  <h3>Auron</h3>

  <div class="messages">

    <div class="msg other">Hola 👀</div>
    <div class="msg me">Todo bien</div>

    <div class="msg other">
      <img src="https://via.placeholder.com/150" width="100%">
    </div>

    <div class="msg other">📍 Ubicación compartida</div>

    <div class="msg other">🎧 Audio (simulado)</div>

  </div>

  <button onclick="openApp('whatsapp')">⬅</button>

</div>
  </div>
</div>

</div>

<script>

// Cambiar pantallas
function show(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screen).classList.add('active');
}

// Encender
function turnOn() {
  show('lock');
}

// Ir a PIN
function goToPin() {
  show('pin');
}

  let startY = 0;

document.getElementById("lock").addEventListener("touchstart", (e) => {
  startY = e.touches[0].clientY;
});

document.getElementById("lock").addEventListener("touchend", (e) => {
  let endY = e.changedTouches[0].clientY;

  if(startY - endY > 50) {
    // si desliza hacia arriba
    goToPin();
  }
});
  
// Hora dinámica
function updateTime() {
  const now = new Date();
  document.getElementById("time").innerText =
    now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

  document.getElementById("date").innerText =
    now.toLocaleDateString();
}
setInterval(updateTime, 1000);
updateTime();

// PIN
let pin = "";
const correctPin = "1115";

function press(num) {
  if(pin.length < 4) {
    pin += num;
    updateDots();
  }

  if(pin.length === 4) {
    if(pin === correctPin) {
      show('home');
    } else {
      pin = "";
      updateDots();
      alert("PIN incorrecto");
    }
  }
}

function updateDots() {
  const dots = document.querySelectorAll(".dot");

  dots.forEach((dot, i) => {
    if(i < pin.length) {
      dot.classList.add("filled");
    } else {
      dot.classList.remove("filled");
    }
  });
}
  
function clearPin() {
  pin = pin.slice(0, -1);
  updateDots();
}
function openApp(app) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(app).classList.remove('hidden');
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
  document.getElementById(tab).classList.remove('hidden');
}

function openChat(chat) {
  openApp(chat);
}

function openContact() {
  alert("Perfil del contacto");
}

function viewStatus() {
  alert("Historia 👀");
}
</script>

</body>
</html>
