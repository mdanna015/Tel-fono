<!DOCTYPE <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Teléfono Narrativo</title>
</style>
</head>

<body>

<div class="phone">

  <!-- OFF -->
  <div id="off" class="screen active" onclick="show('lock')"></div>

  <!-- LOCK -->
  <div id="lock" class="screen">
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>
    <div class="swipe">Desliza ↑</div>
  </div>

  <!-- PIN -->
  <div id="pin" class="screen">
    <div class="pin-dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <div class="keypad">
      <div class="key" onclick="press(1)">1</div>
      <div class="key" onclick="press(2)">2</div>
      <div class="key" onclick="press(3)">3</div>
      <div class="key" onclick="press(4)">4</div>
      <div class="key" onclick="press(5)">5</div>
      <div class="key" onclick="press(6)">6</div>
      <div class="key" onclick="press(7)">7</div>
      <div class="key" onclick="press(8)">8</div>
      <div class="key" onclick="press(9)">9</div>
      <div></div>
      <div class="key" onclick="press(0)">0</div>
      <div onclick="clearPin()">⌫</div>
    </div>
  </div>

  <!-- HOME -->
  <div id="home" class="screen">
    <div class="home-grid">
      <div class="app-icon" onclick="openApp('whatsapp')">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
        <p>WhatsApp</p>
      </div>
    </div>
  </div>

  <!-- WHATSAPP -->
  <div id="whatsapp" class="screen hidden">

    <h3>WhatsApp</h3>

<div class="bottom-bar">
  <div onclick="showTab('chats')" class="tab-btn">Chats</div>
  <div onclick="showTab('status')" class="tab-btn">Estados</div>
  <div onclick="showTab('settings')" class="tab-btn">Ajustes</div>
</div>

<div id="chats" class="tab">

  <div class="chat-item" onclick="openApp('chat1')">
    <img src="https://i.pravatar.cc/40?img=1">
    <div>
      <b>Auron</b>
      <p>Último mensaje...</p>
    </div>
    <span class="time-chat">9:41</span>
  </div>

</div>

    <div id="status" class="tab hidden">
      <p>Historia 👀</p>
    </div>

<div id="settings" class="tab hidden">

  <div class="setting-item">
    <img src="https://i.pravatar.cc/50">
    <div>
      <b>Tu Nombre</b>
      <p>Tu descripción</p>
    </div>
  </div>

  <div class="setting-item">
    📱 Número: 8888-8888
  </div>

  <div class="setting-item" onclick="alert('Bloqueados')">
    🔒 Bloqueados
  </div>

</div>

  <!-- CHAT -->
<div id="chat1" class="screen hidden chat-screen">

  <div class="chat-header">
    <img src="https://i.pravatar.cc/40?img=1" onclick="openProfile()">
    <div>
      <b>Auron</b>
      <p class="online">online</p>
    </div>
  </div>

  <div class="messages">

    <div class="msg other">Hola 👀</div>
    <div class="msg me">Todo bien</div>

    <div class="msg me">
      <img src="https://picsum.photos/200">
    </div>

  <div id="profile" class="screen hidden">

    <h3>Perfil</h3>

    <img src="https://i.pravatar.cc/100?img=1">

    <p><b>Nombre:</b> Auron</p>
    <p><b>Número:</b> 8888-8888</p>
    <p><b>Descripción:</b> No molestar</p>  
  
  <button onclick="openApp('chat1')">⬅</button>

</div>
</div>
  </div>

  <button onclick="openApp('whatsapp')">⬅</button>

</div>

</div>

<script>

function show(screen) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
    s.classList.add('hidden');
  });

  document.getElementById(screen).classList.remove('hidden');
  document.getElementById(screen).classList.add('active');
}

function openApp(app) {
  show(app);
}

// swipe
let startY = 0;

document.getElementById("lock").addEventListener("touchstart", e => {
  startY = e.touches[0].clientY;
});

document.getElementById("lock").addEventListener("touchend", e => {
  let endY = e.changedTouches[0].clientY;
  if(startY - endY > 50) show("pin");
});

// hora
setInterval(() => {
  const now = new Date();
  document.getElementById("time").innerText =
    now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  document.getElementById("date").innerText =
    now.toLocaleDateString();
}, 1000);

// PIN
let pin = "";
const correctPin = "1115";

function press(n) {
  if(pin.length < 4) {
    pin += n;
    updateDots();
  }

  if(pin.length === 4) {
    if(pin === correctPin) show("home");
    else {
      pin = "";
      updateDots();
      alert("PIN incorrecto");
    }
  }
}

function updateDots() {
  const dots = document.querySelectorAll(".dot");
  dots.forEach((d,i)=>{
    d.classList.toggle("filled", i < pin.length);
  });
}

function clearPin() {
  pin = pin.slice(0,-1);
  updateDots();
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
  document.getElementById(tab).classList.remove('hidden');
}

function openProfile() {
  openApp('profile');
}
</script>

</body>
</html>
